<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Timeline Visualization</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <!-- 顶部导航 -->
    <header class="header">
        <div class="logo">📚 Timeline Visualizer</div>

        <div class="control-group">
            <button class="btn btn-secondary" onclick="app.newTimeline()">
                <span>➕</span> 新建时间轴
            </button>
            <button class="btn btn-secondary" onclick="app.importData()">
                <span>📥</span> 导入
            </button>
            <button class="btn btn-secondary" onclick="app.exportData()">
                <span>📤</span> 导出
            </button>
        </div>

        <div class="category-filter" id="categoryFilter">
            <!-- 动态生成分类标签 -->
        </div>
    </header>

    <!-- 主体区域 -->
    <div class="main-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">时间轴列表</div>
                <div class="sidebar-subtitle">选择要显示的时间轴</div>
            </div>
            <div class="timeline-list" id="timelineList">
                <!-- 动态生成 -->
            </div>
        </aside>

        <!-- 时间轴视图 -->
        <main class="timeline-view">
            <div class="toolbar">
                <div class="zoom-controls">
                    <button class="zoom-btn" onclick="app.zoomOut()">−</button>
                    <span class="zoom-level" id="zoomLevel">100%</span>
                    <button class="zoom-btn" onclick="app.zoomIn()">+</button>
                </div>
                <button class="btn btn-secondary" onclick="app.resetView()">
                    <span>⌂</span> 重置视图
                </button>
                <div class="view-options">
                    <button class="btn btn-secondary" onclick="app.previousEvent()">← 上一个</button>
                    <button class="btn btn-secondary" onclick="app.nextEvent()">下一个 →</button>
                </div>
            </div>

            <div class="canvas-container" id="canvasContainer">
                <canvas id="timelineCanvas"></canvas>
                <div class="events-overlay" id="eventsOverlay"></div>
                <div class="empty-state" id="emptyState" style="display: none;">
                    <div class="empty-state-icon">📊</div>
                    <div class="empty-state-text">请选择至少一个时间轴开始浏览</div>
                </div>
            </div>

            <!-- 范围选择器 -->
            <div class="range-selector">
                <div class="range-labels">
                    <span id="rangeStartLabel">1453</span>
                    <span style="color: var(--accent-blue);">拖动滑块调整时间范围</span>
                    <span id="rangeEndLabel">18906416</span>
                </div>
                <div class="range-slider-container" id="rangeSlider">
                    <div class="range-track"></div>
                    <div class="range-selection" id="rangeSelection"></div>
                    <div class="range-handle" id="handleLeft" style="left: 0%;"></div>
                    <div class="range-handle" id="handleRight" style="left: 100%;"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- 详情面板 -->
    <div class="detail-panel" id="detailPanel">
        <div class="detail-header">
            <div class="detail-title-section">
                <div class="detail-year" id="detailYear">-</div>
                <div class="detail-event-title" id="detailTitle">-</div>
            </div>
            <button class="detail-close" onclick="app.closeDetail()">×</button>
        </div>
        <div class="detail-content">
            <div class="detail-section">
                <div class="detail-section-title">简介</div>
                <div class="detail-text" id="detailDesc">-</div>
            </div>
            <div class="detail-section">
                <div class="detail-section-title">详细信息</div>
                <div class="detail-text" id="detailContent">-</div>
            </div>
        </div>
        <div class="detail-meta">
            <div class="detail-meta-item">
                <span class="detail-meta-label">所属时间轴</span>
                <span class="detail-meta-value" id="detailTimeline">-</span>
            </div>
            <div class="detail-meta-item">
                <span class="detail-meta-label">纪元/时期</span>
                <span class="detail-meta-value" id="detailEra">-</span>
            </div>
        </div>
    </div>

    <!-- 模态框：新建/编辑时间轴 -->
    <div class="modal-overlay" id="timelineModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">新建时间轴</div>
                <button class="modal-close" onclick="app.closeModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">标题</label>
                    <input type="text" class="form-input" id="inputTitle" placeholder="例如：三体">
                </div>
                <div class="form-group">
                    <label class="form-label">分类</label>
                    <select class="form-select" id="inputCategory">
                        <option value="科幻文学">科幻文学</option>
                        <option value="科学史">科学史</option>
                        <option value="历史">历史</option>
                        <option value="个人">个人</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">颜色标识</label>
                    <select class="form-select" id="inputColor">
                        <option value="#3b82f6">蓝色</option>
                        <option value="#8b5cf6">紫色</option>
                        <option value="#10b981">绿色</option>
                        <option value="#f43f5e">红色</option>
                        <option value="#f59e0b">橙色</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">事件数据 (JSON格式)</label>
                    <textarea class="form-textarea" id="inputEvents" placeholder='[
  {"year": 2007, "title": "事件标题", "desc": "简介", "detail": "详细信息", "era": "纪元名称"}
]'></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="app.closeModal()">取消</button>
                <button class="btn btn-danger" onclick="app.deleteTimeline()" id="btnDelete"
                    style="display: none;">删除</button>
                <button class="btn btn-primary" onclick="app.saveTimeline()">保存</button>
            </div>
        </div>
    </div>

    <!-- 模态框：导入/导出 -->
    <div class="modal-overlay" id="ioModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title" id="ioModalTitle">数据导入/导出</div>
                <button class="modal-close" onclick="app.closeIOModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">JSON数据</label>
                    <div class="json-preview" id="jsonPreview"></div>
                </div>
                <div class="form-group" id="importSection">
                    <label class="form-label">或粘贴JSON数据导入</label>
                    <textarea class="form-textarea" id="importInput" placeholder="粘贴JSON数据到这里..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="app.closeIOModal()">关闭</button>
                <button class="btn btn-primary" onclick="app.copyToClipboard()">复制到剪贴板</button>
                <button class="btn btn-primary" onclick="app.importFromInput()" id="btnImport">导入</button>
            </div>
        </div>
    </div>

    <!-- 提示信息 -->
    <div class="toast" id="toast"></div>
    <script src="Timeline.js"></script>
</body>

</html>
