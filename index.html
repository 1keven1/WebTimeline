<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>交互式时间轴可视化工具</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <!-- 顶部导航 -->
    <header class="header">
        <div class="logo"> 时间轴可视化工具 </div>

        <div class="control-group">
            <button class="btn btn-secondary" id="themeToggle" onclick="app.toggleTheme()" title="切换日夜模式">
                <span id="themeIcon">☀️</span> <span id="themeText">日间</span>
            </button>
        </div>

        <div class="category-filter" id="categoryFilter">
            <!-- 动态生成分类标签 -->
        </div>
    </header>

    <!-- 主体区域 -->
    <div class="main-container">
        <!-- 侧边栏切换按钮 -->
        <button class="sidebar-toggle" id="sidebarToggle" onclick="app.toggleSidebar()" title="收起/展开">
            <span class="toggle-icon">◀</span>
        </button>

        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">时间轴列表</div>
                <div class="sidebar-subtitle">选择要显示的时间轴</div>
            </div>
            <div class="timeline-list" id="timelineList">
                <!-- 动态生成 -->
            </div>
        </aside>

        <!-- 时间轴视图 -->
        <main class="timeline-view">
            <div class="toolbar">
                <button class="btn btn-secondary" onclick="app.resetView()"> 重置视图 </button>
                <button class="btn btn-secondary" id="fullscreenBtn" onclick="app.toggleFullscreen()"> 
                    <span class="btn-icon">⛶</span>全屏 
                </button>
                <div class="view-range-inputs">
                    <input type="number" class="form-input range-input" id="viewStartInput" placeholder="起始年份">
                    <span class="range-separator">-</span>
                    <input type="number" class="form-input range-input" id="viewEndInput" placeholder="结束年份">
                    <button class="btn btn-secondary btn-sm" onclick="app.applyViewRange()">应用</button>
                </div>
                <button class="btn btn-secondary" id="currentTimeToggle" onclick="app.toggleCurrentTime()" title="显示/隐藏当前时间刻度">
                   当前时间
                </button>
            </div>

            <div class="timeline-canvas-wrapper">
                <div class="canvas-container" id="canvasContainer">
                    <canvas id="timelineCanvas"></canvas>
                    <div class="empty-state" id="emptyState" style="display: none;">
                        <div class="empty-state-icon">📊</div>
                        <div class="empty-state-text">请选择至少一个时间轴开始浏览</div>
                    </div>
                </div>
                <div class="events-overlay" id="eventsOverlay"></div>
            </div>

            <!-- 范围选择器 -->
            <div class="range-selector">
                <div class="range-slider-container" id="rangeSlider">
                    <div class="range-track"></div>
                    <div class="range-selection" id="rangeSelection"></div>
                    <div class="range-handle" id="handleLeft" style="left: 0%;">
                        <span class="handle-label" id="handleLeftLabel">1453</span>
                    </div>
                    <div class="range-handle" id="handleRight" style="left: 100%;">
                        <span class="handle-label" id="handleRightLabel">2020</span>
                    </div>
                </div>
                <div class="range-extent-labels">
                    <span id="extentMinLabel">-10000</span>
                    <span style="color: var(--text-secondary);">整体范围</span>
                    <span id="extentMaxLabel">20000</span>
                </div>
            </div>
        </main>
    </div>

    <!-- 详情面板 -->
    <div class="detail-panel" id="detailPanel">
        <div class="detail-header">
            <div class="detail-title-section">
                <div class="detail-year" id="detailYear">-</div>
                <div class="detail-event-title" id="detailTitle">-</div>
            </div>
            <button class="detail-close" onclick="app.closeDetail()">×</button>
        </div>
        <div class="detail-content">
            <div class="detail-section">
                <div class="detail-section-title">简介</div>
                <div class="detail-text" id="detailDesc">-</div>
            </div>
            <div class="detail-section">
                <div class="detail-section-title">详细信息</div>
                <div class="detail-text" id="detailContent">-</div>
            </div>
        </div>
        <div class="detail-meta">
            <div class="detail-meta-item">
                <span class="detail-meta-label">所属时间轴</span>
                <span class="detail-meta-value" id="detailTimeline">-</span>
            </div>
            <div class="detail-meta-item">
                <span class="detail-meta-label">纪元/时期</span>
                <span class="detail-meta-value" id="detailEra">-</span>
            </div>
        </div>
        <!-- 事件导航按钮 -->
        <div class="detail-nav">
            <button class="btn btn-secondary" onclick="app.previousEvent()">
                <span>←</span> 上一事件
            </button>
            <button class="btn btn-secondary" onclick="app.nextEvent()">
                下一事件 <span>→</span>
            </button>
        </div>
    </div>

    <!-- 模态框：新建/编辑时间轴 -->
    <div class="modal-overlay" id="timelineModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">新建时间轴</div>
                <button class="modal-close" onclick="app.closeModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">标题</label>
                    <input type="text" class="form-input" id="inputTitle" placeholder="例如：三体">
                </div>
                <div class="form-group">
                    <label class="form-label">分类</label>
                    <select class="form-select" id="inputCategory">
                        <option value="科幻文学">科幻文学</option>
                        <option value="科学史">科学史</option>
                        <option value="历史">历史</option>
                        <option value="个人">个人</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">颜色标识</label>
                    <select class="form-select" id="inputColor">
                        <option value="#3b82f6">蓝色</option>
                        <option value="#8b5cf6">紫色</option>
                        <option value="#10b981">绿色</option>
                        <option value="#f43f5e">红色</option>
                        <option value="#f59e0b">橙色</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">事件数据 (JSON格式)</label>
                    <textarea class="form-textarea" id="inputEvents" placeholder=
                    '[{
    "year": 1453,
    "month": 5（可选）,
    "day": 3（可选）,
    "title": "标题",
    "label": "（可选）标签",
    "importance": 0,
    "desc": "描述",
    "detail": "详细内容",
    "era": "时代/纪元（可选）"
}]'></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="app.closeModal()">取消</button>
                <button class="btn btn-danger" onclick="app.deleteTimeline()" id="btnDelete"
                    style="display: none;">删除</button>
                <button class="btn btn-primary" onclick="app.saveTimeline()">保存</button>
            </div>
        </div>
    </div>

    <!-- 模态框：导入/导出 -->
    <div class="modal-overlay" id="ioModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title" id="ioModalTitle">数据导入/导出</div>
                <button class="modal-close" onclick="app.closeIOModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">JSON数据</label>
                    <div class="json-preview" id="jsonPreview"></div>
                </div>
                <div class="form-group" id="importSection">
                    <label class="form-label">或粘贴JSON数据导入</label>
                    <textarea class="form-textarea" id="importInput" placeholder="粘贴JSON数据到这里..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="app.closeIOModal()">关闭</button>
                <button class="btn btn-primary" onclick="app.copyToClipboard()">复制到剪贴板</button>
                <button class="btn btn-primary" onclick="app.importFromInput()" id="btnImport">导入</button>
            </div>
        </div>
    </div>

    <!-- 提示信息 -->
    <div class="toast" id="toast"></div>

    <!-- 横屏提示（移动端） -->
    <!-- 微信浏览器提示 -->
    <div class="wechat-overlay" id="wechatOverlay">
        <div class="wechat-content">
            <div class="wechat-icon">⚠️</div>
            <div class="wechat-text">请用自带浏览器打开</div>
            <div class="wechat-subtext">微信浏览器不支持横屏模式</div>
            <div class="wechat-hint">点击右上角 ⋮ 选择「在浏览器打开」</div>
        </div>
    </div>

    <!-- 普通移动端横屏提示 -->
    <div class="orientation-overlay" id="orientationOverlay">
        <div class="orientation-content">
            <div class="orientation-icon">📱</div>
            <div class="orientation-text">请横屏使用</div>
            <div class="orientation-subtext" id="orientationSubtext">为获得最佳体验，建议锁定为横屏模式</div>
            <button class="orientation-btn" id="fullscreenBtn" onclick="app.enterFullscreenAndLock()">
                <span>🔍</span> <span id="fullscreenBtnText">点击全屏横屏</span>
            </button>
            <div class="orientation-hint" id="orientationHint">或者将手机横向摆放</div>
        </div>
    </div>

    <!-- 右键菜单 -->
    <div class="context-menu" id="contextMenu">
        <div class="context-menu-item" onclick="app.editFromContextMenu()">
            <span class="context-menu-icon">✏️</span> 编辑
        </div>
        <div class="context-menu-item context-menu-delete" onclick="app.deleteFromContextMenu()">
            <span class="context-menu-icon">🗑️</span> 删除
        </div>
    </div>

    <script src="Timeline.js"></script>
    <script src="index.js"></script>
</body>

</html>
